# Database connection settings (Using H2 for instant trial)
# H2 is an in-memory database, meaning it resets when you stop the app.
# If you want to use MySQL, comment these and uncomment the MySQL section below.
spring.datasource.url=jdbc:h2:file:./data/hiddenly_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL settings (Commented out for instant run)
# spring.datasource.url=jdbc:mysql://localhost:3306/hiddenly_db?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT settings
jwt.secret=HiddenlyLearningProjectSuperSecretKey2025ForBeginners
jwt.expiration=86400000

# Allow large image URLs
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Port
server.port=8080

# Load sample data
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
