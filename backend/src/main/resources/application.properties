# LEARNING NOTE:
# application.properties contains configuration for our app.
# We use ${VARIABLE_NAME} to read from environment variables for security.

# Server port
server.port=8080

# Database Configuration (PostgreSQL - Disabled for Demo)
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hiddenly}
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:password}

# Database Configuration (H2 In-Memory - Enabled for Demo)
spring.datasource.url=jdbc:h2:mem:hiddenly;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true

# JWT Configuration
# LEARNING NOTE: The secret should be at least 256 bits (32 chars) for HS256
jwt.secret=${JWT_SECRET:hiddenly_secret_key_for_learning_only_dont_use_in_prod}
jwt.expiration=3600000
jwt.refresh.expiration=604800000

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
