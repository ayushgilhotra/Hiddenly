# --- DEFAULT PROFILE (Local Development with H2) ---
# Used when you run the app locally without any extra configuration
spring.datasource.url=jdbc:h2:file:./data/hiddenly_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate settings for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- PRODUCTION PROFILE (MySQL on Render/Aiven/Railway) ---
# Used when you deploy by setting the environment variable: SPRING_PROFILES_ACTIVE=prod
spring.config.activate.on-profile=prod

# Database credentials injected via Environment Variables by the hosting platform
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate settings for Production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT settings
jwt.secret=HiddenlyLearningProjectSuperSecretKey2025ForBeginners
jwt.expiration=86400000

# Allow large image URLs
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Port
server.port=8080

# Load sample data
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
