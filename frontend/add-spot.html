<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Secret Spot | Hiddenly</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav>
        <a href="index" class="brand">Hiddenly</a>
        <ul class="nav-links">
            <li><a href="explore">Explore</a></li>
            <li><a href="#" id="logout-link" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 600px;">
        <h1 class="text-center">Share a Hidden Gem</h1>
        <p class="text-center" style="color: var(--text-muted); margin-bottom: 40px;">Help others discover what you
            found.</p>

        <form id="add-spot-form"
            style="background: var(--card-bg); padding: 40px; border-radius: var(--border-radius);">
            <div class="form-group">
                <label for="name">Spot Name</label>
                <input type="text" id="name" required placeholder="e.g. The Blue Library Cafe">
            </div>

            <div class="form-group">
                <label for="location">Location / Address</label>
                <!-- Location Search Box -->
                <input type="text" id="map-search" placeholder="🔍 Search for a place or area...">

                <!-- Map Container for Pin Drop -->
                <div id="add-spot-map" class="map-container"></div>
                <p class="map-hint">📍 Click on the map to mark the exact location of your spot</p>

                <input type="text" id="location" required placeholder="e.g. Bandra West, Mumbai">

                <!-- Hidden inputs for coordinates -->
                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="CAFE">Cafe</option>
                        <option value="NATURE">Nature</option>
                        <option value="FOOD">Street Food</option>
                        <option value="ADVENTURE">Adventure</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="budget">Budget Range</label>
                    <select id="budget" required>
                        <option value="Under ₹200">Under ₹200</option>
                        <option value="Under ₹500">Under ₹500</option>
                        <option value="₹500+">₹500+</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="personsCount">Persons (Approx)</label>
                    <input type="number" id="personsCount" min="1" max="50" placeholder="e.g. 2" required>
                </div>
            </div>

            <div class="form-group">
                <label for="imageUrl">Image URL (Optional)</label>
                <input type="url" id="imageUrl" placeholder="Paste an image link from the web">
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Tip: Leave blank to use a
                    default image.</p>
            </div>

            <div class="form-group">
                <label for="description">Description (Secrets/Tips)</label>
                <textarea id="description" rows="5" required
                    placeholder="Tell us why this place is hidden/special..."></textarea>
            </div>

            <button type="submit" style="width: 100%; margin-top: 10px;">Post Secret Spot</button>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/maps.js"></script>

    <!-- Google Maps API -->
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your actual key -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCos3Z4n3jwzEUgUTCd1qXepgTC1jQdahE&libraries=places"></script>

    <script>
        // Check if logged in, if not redirect
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            initAddSpotMap();
        });

        let map, marker, geocoder;

        /**
         * Initializes the map on the Add Spot page
         * Allows users to search for places and drop a pin
         */
        function initAddSpotMap() {
            // Initialize the map centered on India
            map = initDarkMap('add-spot-map', {
                center: { lat: 20.5937, lng: 78.9629 },
                zoom: 5
            });

            geocoder = new google.maps.Geocoder();

            // 1. Setup Places Autocomplete for the search box
            const searchInput = document.getElementById('map-search');
            const autocomplete = new google.maps.places.Autocomplete(searchInput);
            autocomplete.bindTo('bounds', map);

            // When user selects a place from suggestions
            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) return;

                // Move map to the place
                if (place.geometry.viewport) {
                    map.fitBounds(place.geometry.viewport);
                } else {
                    map.setCenter(place.geometry.location);
                    map.setZoom(17);
                }

                // Place marker there
                updateMarker(place.geometry.location);

                // If the place has a formatted address, fill it
                if (place.formatted_address) {
                    document.getElementById('location').value = place.formatted_address;
                }
            });

            // 2. Click on map to drop/move pin
            map.addListener('click', (e) => {
                updateMarker(e.latLng);
                reverseGeocode(e.latLng);
            });
        }

        /**
         * Moves or creates the marker at a specific location
         */
        function updateMarker(latLng) {
            if (marker) {
                marker.setPosition(latLng);
            } else {
                marker = createSpotMarker(map, latLng, "Spot Location");
            }

            // Save coordinates to hidden fields
            document.getElementById('latitude').value = latLng.lat();
            document.getElementById('longitude').value = latLng.lng();
        }

        /**
         * Converts coordinates into a real address (Reverse Geocoding)
         */
        function reverseGeocode(latLng) {
            geocoder.geocode({ location: latLng }, (results, status) => {
                if (status === "OK" && results[0]) {
                    document.getElementById('location').value = results[0].formatted_address;
                }
            });
        }

        document.getElementById('add-spot-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const lat = document.getElementById('latitude').value;
            const lng = document.getElementById('longitude').value;

            const spotData = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                category: document.getElementById('category').value,
                budgetRange: document.getElementById('budget').value,
                personsCount: parseInt(document.getElementById('personsCount').value),
                imageUrl: document.getElementById('imageUrl').value.trim(),
                description: document.getElementById('description').value,
                latitude: lat ? parseFloat(lat) : null,
                longitude: lng ? parseFloat(lng) : null
            };

            try {
                await api.addSpot(spotData);
                showAlert('Spot added successfully!');
                navigateTo('explore');
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>

</html>
