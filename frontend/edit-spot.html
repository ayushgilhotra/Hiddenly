<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Secret Spot | Hiddenly</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- SIDEBAR MENU -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="brand"><img src="assets/images/logo.png" alt="Logo"> Hiddenly</span>
            <div class="hamburger" onclick="toggleSidebar(false)">
                <span></span><span></span><span></span>
            </div>
        </div>
        <ul class="sidebar-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="explore.html"><i class="fas fa-search"></i> Explore</a></li>
            <li><a href="explore.html?view=map"><i class="fas fa-map-marked-alt"></i> Full Map</a></li>
            <li><a href="add-spot.html" id="side-add-spot" class="hidden"><i class="fas fa-plus-circle"></i> Add a Spot</a></li>
            <li><hr style="border-color: rgba(212, 168, 83, 0.1); margin: 10px 0;"></li>
            <li><a href="help.html"><i class="fas fa-question-circle"></i> Help Guide</a></li>
            <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a></li>
            <li id="side-logout" class="hidden"><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <nav>
        <div class="hamburger" onclick="toggleSidebar(true)">
            <span></span><span></span><span></span>
        </div>
        <a href="index.html" class="brand"><img src="assets/images/logo.png" alt="Logo"> Hiddenly</a>
        <ul class="nav-links">
            <li><a href="explore.html">Explore</a></li>
            <li id="nav-auth-links">
                <a href="login.html" id="login-link">Login</a>
                <a href="register.html" id="register-link" class="btn-auth">Register</a>
            </li>
            <li id="nav-user-info" class="hidden">
                 <span id="nav-user-name" style="color: var(--primary); font-size: 0.9rem; margin-right: 15px;"></span>
                 <a href="add-spot.html" class="btn-auth">Add Spot</a>
            </li>
        </ul>
    </nav>

    <div class="container" style="max-width: 600px;">
        <h1 class="text-center">Edit Your Hidden Gem</h1>
        <p class="text-center" style="color: var(--text-muted); margin-bottom: 40px;">Keep the details fresh for fellow
            explorers.</p>

        <form id="edit-spot-form"
            style="background: var(--card-bg); padding: 40px; border-radius: var(--border-radius);">
            <div class="form-group">
                <label for="name">Spot Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="location">Location / Address</label>
                <input type="text" id="location" required>
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="CAFE">Cafe</option>
                        <option value="NATURE">Nature</option>
                        <option value="FOOD">Street Food</option>
                        <option value="ADVENTURE">Adventure</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="budget">Budget Range</label>
                    <select id="budget" required>
                        <option value="Under ₹200">Under ₹200</option>
                        <option value="Under ₹500">Under ₹500</option>
                        <option value="₹500+">₹500+</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="personsCount">Persons (Approx)</label>
                <input type="number" id="personsCount" min="1" max="50" required>
            </div>

            <div class="form-group">
                <label for="imageUrl">Image URL (Optional)</label>
                <input type="url" id="imageUrl" placeholder="Leave blank to keep current image">
            </div>

            <div class="form-group">
                <label for="description">Description (Secrets/Tips)</label>
                <textarea id="description" rows="5" required></textarea>
            </div>

            <button type="submit" style="width: 100%; margin-top: 10px;">Update Secret Spot</button>
            <button type="button" onclick="window.history.back()"
                style="width: 100%; margin-top: 10px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);">Cancel</button>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/spots.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuth();
            const id = getUrlParam('id');
            if (!id) {
                navigateTo('explore');
                return;
            }

            try {
                const spot = await api.getSpotById(id);
                // Pre-fill the form
                document.getElementById('name').value = spot.name;
                document.getElementById('location').value = spot.location;
                document.getElementById('category').value = spot.category;
                document.getElementById('budget').value = spot.budgetRange;
                document.getElementById('personsCount').value = spot.personsCount || 2;
                document.getElementById('description').value = spot.description;
            } catch (error) {
                showAlert('Failed to load spot data', 'error');
            }
        });

        document.getElementById('edit-spot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = getUrlParam('id');

            const spotData = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                category: document.getElementById('category').value,
                budgetRange: document.getElementById('budget').value,
                personsCount: parseInt(document.getElementById('personsCount').value),
                imageUrl: document.getElementById('imageUrl').value.trim(),
                description: document.getElementById('description').value
            };

            try {
                toggleLoader(true, 'Updating your secret... Please wait');
                await api.updateSpot(id, spotData);
                showAlert('Spot updated successfully!');
                navigateTo(`spot?id=${id}`);
            } catch (error) {
                showAlert(error.message, 'error');
            } finally {
                toggleLoader(false);
            }
        });
    </script>
</body>

</html>
