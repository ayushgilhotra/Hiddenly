<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Hiddenly</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav>
        <a href="index.html" class="brand">Hiddenly</a>
        <ul class="nav-links">
            <li><a href="explore.html">Explore</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="auth-form">
        <h2 class="text-center">Join the Community</h2>
        <p class="text-center" style="color: var(--text-muted); margin-bottom: 30px;">Start sharing your favorite hidden
            gems</p>

        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Ayush Gilhotra">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Minimum 6 characters">
            </div>

            <button type="submit" style="width: 100%;">Create Account</button>
        </form>

        <p class="text-center mt-20" style="font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: var(--primary);">Login here</a>
        </p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await api.register({ name, email, password });
                showAlert('Registration successful! You can now login.');
                navigateTo('login.html');
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>

</html>
