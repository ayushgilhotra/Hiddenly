<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Gems | Hiddenly</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- SIDEBAR MENU -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="brand"><img src="assets/images/logo.png" alt="Logo"> Hiddenly</span>
            <div class="hamburger" onclick="toggleSidebar(false)">
                <span></span><span></span><span></span>
            </div>
        </div>
        <ul class="sidebar-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="explore.html" class="active"><i class="fas fa-search"></i> Explore</a></li>
            <li><a href="explore.html?view=map"><i class="fas fa-map-marked-alt"></i> Full Map</a></li>
            <li><a href="add-spot.html" id="side-add-spot" class="hidden"><i class="fas fa-plus-circle"></i> Add a Spot</a></li>
            <li><hr style="border-color: rgba(212, 168, 83, 0.1); margin: 10px 0;"></li>
            <li><a href="help.html"><i class="fas fa-question-circle"></i> Help Guide</a></li>
            <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a></li>
            <li id="side-logout" class="hidden"><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <!-- NAVBAR -->
    <nav>
        <div class="hamburger" onclick="toggleSidebar(true)">
            <span></span><span></span><span></span>
        </div>
        <a href="index.html" class="brand"><img src="assets/images/logo.png" alt="Logo"> Hiddenly</a>
        <ul class="nav-links">
            <li><a href="explore.html">Explore</a></li>
            <li id="nav-auth-links">
                <a href="login.html" id="login-link">Login</a>
                <a href="register.html" id="register-link" class="btn-auth">Register</a>
            </li>
            <li id="nav-user-info" class="hidden">
                 <span id="nav-user-name" style="color: var(--primary); font-size: 0.9rem; margin-right: 15px;"></span>
                 <a href="add-spot.html" class="btn-auth">Add Spot</a>
            </li>
        </ul>
    </nav>

    <!-- LIST-FIRST CONTAINER -->
    <main class="container">
        <section class="explore-list-view">
            <h1 id="explore-title">Explore Hidden Gems</h1>

            <!-- FILTER BAR -->
            <div style="background: var(--card-bg); padding: 20px; border-radius: var(--border-radius); margin-bottom: 30px; border: 1px solid rgba(212, 168, 83, 0.1);">
                <label style="display: block; margin-bottom: 12px; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Categories</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="filter-btn active" data-category="ALL" onclick="filterByCategory('ALL')">All</button>
                    <button class="filter-btn" data-category="CAFE" onclick="filterByCategory('CAFE')">Cafes</button>
                    <button class="filter-btn" data-category="NATURE" onclick="filterByCategory('NATURE')">Nature</button>
                    <button class="filter-btn" data-category="FOOD" onclick="filterByCategory('FOOD')">Food</button>
                    <button class="filter-btn" data-category="ADVENTURE" onclick="filterByCategory('ADVENTURE')">Adventure</button>
                </div>
            </div>

            <div id="explore-spots-grid" class="grid">
                <!-- Spots will be loaded here -->
                <p class="text-center">Loading amazing spots...</p>
            </div>
        </section>

        <!-- BOTTOM MAP SECTION (Hidden until triggered) -->
        <section id="map-section" class="hidden" style="margin-top: 50px;">
            <h2 style="margin-bottom: 20px;">Spot Location</h2>
            <div id="explore-map" class="map-container" style="height: 400px; width: 100%;"></div>
            <p class="text-center mt-20">
                <button onclick="document.getElementById('map-section').classList.add('hidden')" class="filter-btn">Close Map</button>
            </p>
        </section>
    </main>

    <!-- CORE SCRIPTS -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/maps.js"></script>
    <script src="js/spots.js"></script>

    <!-- Google Maps API -->
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your actual key -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCos3Z4n3jwzEUgUTCd1qXepgTC1jQdahE&libraries=places"></script>

    <script>
        // Set active class on filter buttons based on URL
        document.addEventListener('DOMContentLoaded', () => {
            const cat = getUrlParam('category') || 'ALL';
            loadExploreSpots();

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });
        });

        function filterByCategory(cat) {
            const nearMe = getUrlParam('nearMe');
            let query = `?category=${cat}`;
            if (nearMe) query += `&nearMe=${nearMe}`;

            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + query;
            window.history.pushState({ path: newUrl }, '', newUrl);

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });

            loadExploreSpots();
        }
    </script>
</body>

</html>
