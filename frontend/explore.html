<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Gems | Hiddenly</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="index" class="brand">Hiddenly</a>
        <ul class="nav-links">
            <li><a href="explore" style="color: var(--primary);">Explore</a></li>
            <li><a href="add-spot" id="add-spot-link" class="hidden">Add a Spot</a></li>
            <li><a href="login" id="login-link">Login</a></li>
            <li><a href="register" id="register-link" class="btn-auth">Register</a></li>
            <li id="user-name" class="hidden" style="color: var(--primary); font-weight: bold;"></li>
            <li><a href="#" id="logout-link" class="hidden" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <!-- SPLIT LAYOUT CONTAINER -->
    <main class="explore-container">
        <!-- LEFT SIDE: CARDS & FILTERS (40%) -->
        <section class="explore-sidebar">
            <h1 id="explore-title">Explore Hidden Gems</h1>

            <!-- FILTER BAR -->
            <div
                style="background: var(--card-bg); padding: 15px; border-radius: var(--border-radius); margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
                <div>
                    <label
                        style="display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-muted);">Category</label>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="filter-btn active" data-category="ALL"
                            onclick="filterByCategory('ALL')">All</button>
                        <button class="filter-btn" data-category="CAFE" onclick="filterByCategory('CAFE')">Cafe</button>
                        <button class="filter-btn" data-category="NATURE"
                            onclick="filterByCategory('NATURE')">Nature</button>
                        <button class="filter-btn" data-category="FOOD" onclick="filterByCategory('FOOD')">Food</button>
                        <button class="filter-btn" data-category="ADVENTURE"
                            onclick="filterByCategory('ADVENTURE')">Adventure</button>
                    </div>
                </div>

                <div style="display: none;"> <!-- Keeping budget filter hidden but functional if needed later -->
                    <select id="filter-budget">
                        <option value="ALL">Any Budget</option>
                    </select>
                </div>
            </div>

            <div id="explore-spots-grid" class="flex-column" style="display: flex; flex-direction: column; gap: 20px;">
                <!-- Spots will be loaded here -->
                <p class="text-center">Loading amazing spots...</p>
            </div>
        </section>

        <!-- RIGHT SIDE: LIVE MAP (60%) -->
        <section id="explore-map" class="explore-map-container">
            <!-- Map will be initialized here -->
        </section>
    </main>

    <!-- CORE SCRIPTS -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/maps.js"></script>
    <script src="js/spots.js"></script>

    <!-- Google Maps API -->
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your actual key -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCos3Z4n3jwzEUgUTCd1qXepgTC1jQdahE&libraries=places"></script>

    <script>
        // Update the select dropdown to match the URL category
        document.addEventListener('DOMContentLoaded', () => {
            const cat = getUrlParam('category') || 'ALL';
            loadExploreSpots();

            // Set active class on filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.category === cat) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        });

        /**
         * Filter spots by category and update UI
         */
        function filterByCategory(cat) {
            // Update URL without reloading (cleaner feel)
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?category=' + cat;
            window.history.pushState({ path: newUrl }, '', newUrl);

            // Update UI buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });

            // Reload spots
            loadExploreSpots();
        }
    </script>
</body>

</html>
