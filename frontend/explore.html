<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Gems | Hiddenly</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="index" class="brand">Hiddenly</a>
        <ul class="nav-links">
            <li><a href="explore" style="color: var(--primary);">Explore</a></li>
            <li><a href="add-spot" id="add-spot-link" class="hidden">Add a Spot</a></li>
            <li><a href="login" id="login-link">Login</a></li>
            <li><a href="register" id="register-link" class="btn-auth">Register</a></li>
            <li id="user-name" class="hidden" style="color: var(--primary); font-weight: bold;"></li>
            <li><a href="#" id="logout-link" class="hidden" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <section class="container">
        <h1 id="explore-title">Explore all Hidden Gems</h1>

        <!-- FILTER BAR -->
        <div
            style="background: var(--card-bg); padding: 20px; border-radius: var(--border-radius); margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
            <div style="flex: 1; min-width: 200px;">
                <label
                    style="display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-muted);">Category</label>
                <select id="filter-category" onchange="navigateTo('explore?category=' + this.value)">
                    <option value="ALL">All Categories</option>
                    <option value="CAFE">Cafes</option>
                    <option value="NATURE">Nature</option>
                    <option value="FOOD">Food</option>
                    <option value="ADVENTURE">Adventure</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>

            <div style="flex: 1; min-width: 210px;">
                <label
                    style="display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-muted);">Budget</label>
                <select id="filter-budget">
                    <option value="ALL">Any Budget</option>
                    <option value="Under ₹200">Under ₹200</option>
                    <option value="Under ₹500">Under ₹500</option>
                    <option value="₹500+">₹500+</option>
                </select>
            </div>
        </div>

        <div id="explore-spots-grid" class="grid">
            <!-- Spots will be loaded here -->
            <p class="text-center">Loading amazing spots...</p>
        </div>
    </section>

    <!-- CORE SCRIPTS -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/spots.js"></script>

    <script>
        // Update the select dropdown to match the URL category
        document.addEventListener('DOMContentLoaded', () => {
            const cat = getUrlParam('category') || 'ALL';
            document.getElementById('filter-category').value = cat;
            loadExploreSpots();
        });
    </script>
</body>

</html>
