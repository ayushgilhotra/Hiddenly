# docker-compose.yml
# LEARNING NOTE:
# Docker Compose allows us to run multi-container applications easily.
# Here, we define a "service" for our PostgreSQL database.
# This means you don't need to install PostgreSQL manually on your machine!
# You just need "Docker Desktop" installed.

services:
  db:
    image: postgres:15-alpine
    container_name: hiddenly-db
    environment:
      POSTGRES_DB: hiddenly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional: pgAdmin to view the database in the browser
  pgadmin:
    image: dpage/pgadmin4
    container_name: hiddenly-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hiddenly.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
